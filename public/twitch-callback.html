<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Liaison Twitch — VOID Pack</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #050210;
    background-image: radial-gradient(circle at 50% 0%, rgba(123,43,255,0.15), transparent 60%);
    color: #fff;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    max-width: 380px; width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 32px 24px;
    text-align: center;
  }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
  p { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.5; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(123,43,255,0.2);
    border-top-color: #7b2bff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 16px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .success { color: #00c896; }
  .error { color: #ff4757; }
  a.btn {
    display: inline-block; margin-top: 20px;
    padding: 12px 24px; border-radius: 14px;
    background: linear-gradient(135deg,#7b2bff,#4a1fa8);
    color: #fff; text-decoration: none; font-weight: 700; font-size: 14px;
  }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon">🔗</div>
    <h1>Liaison du compte Twitch</h1>
    <div class="spinner"></div>
    <p>Vérification en cours...</p>
  </div>

  <script>
    const TWITCH_CLIENT_ID = 'cqxwy2c8tbocyx5lsbzi2iblgyow5j'

    function showError(msg) {
      document.getElementById('card').innerHTML = `
        <div class="icon">⚠️</div>
        <h1 class="error">Échec de la liaison</h1>
        <p>${msg}</p>
        <a class="btn" href="/profil">Retour au profil</a>
      `
    }

    function showSuccess(login) {
      document.getElementById('card').innerHTML = `
        <div class="icon">✅</div>
        <h1 class="success">Compte lié !</h1>
        <p>Ton compte Twitch <strong>${login}</strong> est maintenant lié à VOID Pack.</p>
        <a class="btn" href="/profil">Retour au profil</a>
      `
    }

    async function run() {
      // Twitch renvoie le token dans le hash (#access_token=...)
      const hash   = window.location.hash.substring(1)
      const params = new URLSearchParams(hash)
      const accessToken = params.get('access_token')
      const state  = params.get('state')
      const savedState  = sessionStorage.getItem('twitch_oauth_state')

      if (params.get('error')) {
        showError(params.get('error_description') || 'Autorisation refusée.')
        return
      }
      if (!accessToken) {
        showError('Token Twitch manquant dans la réponse.')
        return
      }
      if (state !== savedState) {
        showError('State OAuth invalide. Réessaie depuis le profil.')
        return
      }
      sessionStorage.removeItem('twitch_oauth_state')

      // Récupérer l'identité Twitch
      let twitchUser
      try {
        const res = await fetch('https://api.twitch.tv/helix/users', {
          headers: {
            'Authorization': `Bearer ${accessToken}`,
            'Client-Id': TWITCH_CLIENT_ID,
          },
        })
        if (!res.ok) throw new Error(`Twitch API ${res.status}`)
        const { data } = await res.json()
        twitchUser = data && data[0]
        if (!twitchUser) throw new Error('Profil Twitch introuvable.')
      } catch (e) {
        showError('Impossible de récupérer ton profil Twitch : ' + e.message)
        return
      }

      // Configuration Supabase (clés publiques)
      const supabaseUrl = 'https://upsfxgqfjfjajyunjvyp.supabase.co'
      const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVwc2Z4Z3FmamZqYWp5dW5qdnlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MTU5ODMsImV4cCI6MjA5MzQ5MTk4M30.zWrG3oawhYgLRx7TeUALL6jbJP8o1sLS9V9or22KwcM'

      // Session Supabase courante (pour le Bearer joueur, pas l'anon key)
      let userAccessToken = supabaseKey
      try {
        const stored = localStorage.getItem(`sb-${new URL(supabaseUrl).hostname.split('.')[0]}-auth-token`)
        if (stored) {
          const session = JSON.parse(stored)
          if (session?.access_token) userAccessToken = session.access_token
        }
      } catch {}

      // Appeler la RPC Supabase pour lier le compte
      try {
        const res = await fetch(`${supabaseUrl}/rest/v1/rpc/link_twitch_account`, {
          method: 'POST',
          headers: {
            'apikey': supabaseKey,
            'Authorization': `Bearer ${userAccessToken}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            p_twitch_id:    twitchUser.id,
            p_twitch_login: twitchUser.login,
          }),
        })
        if (!res.ok) {
          const err = await res.json().catch(() => ({}))
          throw new Error(err.message || `HTTP ${res.status}`)
        }
      } catch (e) {
        showError('Impossible de lier le compte dans VOID Pack : ' + e.message)
        return
      }

      showSuccess(twitchUser.login)
    }

    run()
  </script>
</body>
</html>
